<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IRCTC IVR Simulator</title>
<link rel="stylesheet" href="/static/style.css" />
</head>

<body>

<div class="ivr-wrapper">

<div class="ivr-header">
<div class="ivr-logo-badge">
<div class="logo-dot"></div>
<span class="logo-text">IRCTC · IVR</span>
</div>

<h1 class="ivr-title">Conversational <span>IVR</span></h1>
<p class="ivr-subtitle">// AI-Powered Voice Interface //</p>

</div>


<div class="ivr-card">

<p class="menu-label">Select Service</p>

<div class="menu-grid">

<button class="menu-btn" onclick="selectOption('1')">
<div class="btn-key">1</div>
<div class="btn-info">
<span class="btn-title">Ticket Booking</span>
<span class="btn-desc">Book a journey</span>
</div>
</button>

<button class="menu-btn" onclick="selectOption('2')">
<div class="btn-key">2</div>
<div class="btn-info">
<span class="btn-title">PNR Status</span>
<span class="btn-desc">Check booking</span>
</div>
</button>

<button class="menu-btn" onclick="selectOption('3')">
<div class="btn-key">3</div>
<div class="btn-info">
<span class="btn-title">Cancel Ticket</span>
<span class="btn-desc">Refund process</span>
</div>
</button>

<button class="menu-btn" onclick="selectOption('4')">
<div class="btn-key">4</div>
<div class="btn-info">
<span class="btn-title">Train Availability</span>
<span class="btn-desc">Check seats</span>
</div>
</button>

<button class="menu-btn menu-btn-wide" onclick="selectOption('5')">
<div class="btn-key">5</div>
<div class="btn-info">
<span class="btn-title">Talk to Customer Care Agent</span>
<span class="btn-desc">Connect to live support</span>
</div>
</button>

</div>


<div class="input-section">

<label class="input-label">Manual / Voice Input</label>

<div class="input-row">

<input
type="text"
id="userInput"
class="ivr-input"
placeholder="Speak or type your request..."
onkeydown="if(event.key==='Enter') sendInput()"
/>

<button class="ivr-submit" onclick="sendInput()">Send</button>

<button class="ivr-submit" onclick="startVoice()">🎤</button>

</div>

</div>


<!-- NEW VOICE RECOGNITION SCREEN -->

<div class="voice-panel">

<div class="voice-title">🎤 Voice Recognition</div>

<div id="voiceStatus">Press microphone and speak</div>

<div id="voiceText"></div>

</div>



<div class="response-box" id="responseBox">

<div class="response-header">
<div class="response-avatar">IVR</div>
<span class="response-title">IRCTC Assistant</span>
<span class="response-status">● Online</span>
</div>

<div class="response-body" id="responseText">
Welcome. Press Start IVR to begin.
</div>

</div>


<div class="ivr-footer">
<div class="status-dot">SYSTEM ONLINE</div>
<span class="session-tag" id="sessionTag"></span>
<button class="restart-btn" onclick="restartSession()">↺ Restart</button>
</div>


</div>
</div>



<script>

const sessionId = "user123";

// ── State flags ──────────────────────────────────────
let isSpeaking  = false;  // true while TTS is playing → block mic
let isListening = false;  // true while recognition is active

document.getElementById("sessionTag").innerText = "SESSION : " + sessionId.toUpperCase();

// ── Set response ─────────────────────────────────────
function setResponse(text) {
  document.getElementById("responseText").innerText = text;
}

// ── Text-to-Speech (mutes mic while speaking) ────────
function speak(text, onDone) {
  if (!window.speechSynthesis) { if (onDone) onDone(); return; }

  isSpeaking = true;
  stopVoice();  // stop mic before speaking

  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = "en-US";

  utt.onend = function () {
    isSpeaking = false;
    document.getElementById("voiceStatus").innerText = "Press microphone and speak";
    if (onDone) onDone();
  };

  utt.onerror = function () {
    isSpeaking = false;
    if (onDone) onDone();
  };

  speechSynthesis.cancel();
  speechSynthesis.speak(utt);
}

// ── Send input to backend ────────────────────────────
async function sendInput() {
  const inputBox = document.getElementById("userInput");
  const input = inputBox.value.trim();
  if (!input) return;
  inputBox.value = "";

  try {
    const res  = await fetch("/ivr", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ session_id: sessionId, input: input })
    });
    const data = await res.json();
    const text = data.text || data.response || "No response";
    setResponse(text);

    // Speak response, then resume listening when done
    speak(text, function () {
      setTimeout(startVoice, 800);
    });

  } catch (e) {
    setResponse("Connection error — is the server running?");
  }
}

// ── Menu buttons ─────────────────────────────────────
function selectOption(val) {
  document.getElementById("userInput").value = val;
  sendInput();
}

// ── Restart session ──────────────────────────────────
async function restartSession() {
  try {
    await fetch("/reset", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ session_id: sessionId, input: "" })
    });
  } catch (e) {}
  setResponse("Session restarted. Press a menu option or speak.");
}

// ── Voice Recognition ─────────────────────────────────
let recognition = null;

try {
  const SpeechAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechAPI) {
    recognition = new SpeechAPI();
    recognition.lang = "en-US";
    recognition.interimResults = true;
    recognition.continuous = false;

    recognition.onstart = function () {
      isListening = true;
      document.getElementById("voiceStatus").innerText = "Listening...";
    };

    recognition.onresult = function (event) {
      // Ignore anything captured while TTS was still fading
      if (isSpeaking) return;
      let transcript = "";
      for (let i = 0; i < event.results.length; i++) {
        transcript += event.results[i][0].transcript;
      }
      document.getElementById("voiceText").innerText  = transcript;
      document.getElementById("userInput").value = transcript;
    };

    recognition.onend = function () {
      isListening = false;
      // Only process if we're NOT speaking and there's actual input
      if (!isSpeaking) {
        const val = document.getElementById("userInput").value.trim();
        if (val) {
          document.getElementById("voiceStatus").innerText = "Processing...";
          sendInput();
        } else {
          document.getElementById("voiceStatus").innerText = "Press microphone and speak";
        }
      }
    };

    recognition.onerror = function (e) {
      isListening = false;
      const status = document.getElementById("voiceStatus");
      if (e.error === "no-speech") {
        status.innerText = "No speech detected. Try again.";
      } else if (e.error === "not-allowed") {
        status.innerText = "Microphone access denied.";
      } else {
        status.innerText = "Error: " + e.error;
      }
    };
  }
} catch (e) {
  console.warn("SpeechRecognition unavailable:", e);
}

function startVoice() {
  if (!recognition) {
    document.getElementById("voiceStatus").innerText = "Voice not supported in this browser";
    return;
  }
  if (isSpeaking || isListening) return;  // don't start if bot is talking or already listening
  document.getElementById("voiceText").innerText = "";
  try { recognition.start(); } catch (e) { console.warn(e); }
}

function stopVoice() {
  if (recognition && isListening) {
    try { recognition.stop(); } catch (e) {}
  }
}
// ── Auto start IVR when page loads ─────────────────

window.addEventListener("load", function(){

  fetch("/ivr",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      session_id:sessionId,
      input:""
    })
  })
  .then(res=>res.json())
  .then(data=>{
      const text=data.text || data.response
      setResponse(text)

      // speak welcome message
      speak(text,function(){
        setTimeout(startVoice,800)
      })
  })

})

window.addEventListener("load", function () {

  fetch("/ivr", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      session_id: sessionId,
      input: ""
    })
  })
  .then(response => response.json())
  .then(data => {

    const text = data.text || data.response || "Welcome to IRCTC IVR";

    setResponse(text);

    // speak welcome message
    speak(text, function () {

      // start listening after speaking
      setTimeout(startVoice, 1000);

    });

  })
  .catch(() => {
    setResponse("Unable to connect to IVR service.");
  });

});
</script>

</body>
</html>
